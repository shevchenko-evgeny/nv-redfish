name: CI

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
      - "release/v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
      - run: make ci

  bench-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          valgrind --version

      - name: Benchmark merge-base
        # Installs the runner matching the *base* lockfile, so a PR that
        # bumps gungraun still measures the base correctly. Only the
        # specific "no bench target at base" case is tolerated; every
        # other failure fails the job so the gate can never silently
        # stop comparing.
        run: |
          set -euo pipefail
          BASE=$(git merge-base HEAD origin/main)
          if [ "$BASE" = "$(git rev-parse HEAD)" ]; then
            echo "HEAD is the merge-base; nothing to compare"
            echo "SKIP_COMPARE=1" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "baseline commit: $BASE"
          git checkout --recurse-submodules "$BASE"
          VERSION=$(cargo metadata --format-version=1 \
            | jq -r '[.packages[] | select(.name == "gungraun") | .version] | first // empty')
          if [ -z "$VERSION" ]; then
            echo "no gungraun at merge-base; head run records the initial baselines"
          else
            echo "base gungraun $VERSION"
            cargo install gungraun-runner --version "$VERSION" --locked
            for entry in "nv-redfish-dispatcher scheduler" "nv-redfish-bmc-http cache"; do
              set -- $entry
              HAS_BENCH=$(cargo metadata --format-version=1 --no-deps \
                | jq --arg p "$1" --arg b "$2" \
                  '[.packages[] | select(.name == $p)
                    | .targets[] | select(.kind == ["bench"] and .name == $b)] | length')
              if [ "$HAS_BENCH" = "0" ]; then
                echo "no $2 bench in $1 at merge-base; head run records its baseline"
              else
                cargo bench -p "$1" --bench "$2" -- --save-baseline=base
              fi
            done
          fi
          git checkout --recurse-submodules -f -

      - name: Benchmark head against base
        if: env.SKIP_COMPARE != '1'
        # The runner version must match the head's library version;
        # taken from the lockfile so they cannot drift.
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version=1 \
            | jq -r '[.packages[] | select(.name == "gungraun") | .version] | first')
          echo "head gungraun $VERSION"
          cargo install gungraun-runner --version "$VERSION" --locked
          for entry in "nv-redfish-dispatcher scheduler" "nv-redfish-bmc-http cache"; do
            set -- $entry
            cargo bench -p "$1" --bench "$2" -- \
              --baseline=base \
              --callgrind-limits='ir=2%'
          done
